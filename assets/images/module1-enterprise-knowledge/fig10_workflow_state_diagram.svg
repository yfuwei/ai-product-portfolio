<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="760" viewBox="0 0 1300 760">
    <defs>
      <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#F8FBFF"/><stop offset="1" stop-color="#FFFFFF"/></linearGradient>
      <linearGradient id="bluegrad" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#4F7CF7"/><stop offset="1" stop-color="#2CD4BF"/></linearGradient>
      <linearGradient id="softblue" x1="0" x2="1"><stop offset="0" stop-color="#EEF4FF"/><stop offset="1" stop-color="#F7FFFC"/></linearGradient>
      <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#15234D" flood-opacity="0.08"/></filter>
      <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#7F8BA3"/></marker>
    </defs><rect width="1300" height="760" fill="url(#bg)"/><text x="42" y="60" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="34" font-weight="800" fill="#172033" text-anchor="start"><tspan x="42" dy="0">问答执行流程与状态示意</tspan></text><text x="42" y="96" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="19" font-weight="400" fill="#65708A" text-anchor="start"><tspan x="42" dy="0">系统输出并非单步生成，而是经历检索、组织、确认与完成等多个状态。</tspan></text><rect x="90" y="270" width="165" height="110" rx="22" fill="#FFFFFF" stroke="#CAD6EA" stroke-width="1.2" opacity="1"/><circle cx="124" cy="312" r="20" fill="#2F66F5" opacity="0.95"/><text x="124" y="316.6666666666667" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="14" font-weight="700" fill="#fff" text-anchor="middle"><tspan x="124" dy="0">1</tspan></text><text x="156" y="308" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="20" font-weight="800" fill="#172033" text-anchor="start"><tspan x="156" dy="0">待理解</tspan></text><text x="116" y="346" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="14" font-weight="400" fill="#65708A" text-anchor="start"><tspan x="116" dy="0">解析任务与目标</tspan></text><line x1="263" y1="325" x2="282" y2="325" stroke="#879AB8" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="290" y="270" width="165" height="110" rx="22" fill="#FFFFFF" stroke="#CAD6EA" stroke-width="1.2" opacity="1"/><circle cx="324" cy="312" r="20" fill="#F5A623" opacity="0.95"/><text x="324" y="316.6666666666667" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="14" font-weight="700" fill="#fff" text-anchor="middle"><tspan x="324" dy="0">2</tspan></text><text x="356" y="308" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="20" font-weight="800" fill="#172033" text-anchor="start"><tspan x="356" dy="0">需澄清</tspan></text><text x="316" y="346" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="14" font-weight="400" fill="#65708A" text-anchor="start"><tspan x="316" dy="0">补充范围 / 背景</tspan></text><line x1="463" y1="325" x2="482" y2="325" stroke="#879AB8" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="490" y="270" width="165" height="110" rx="22" fill="#FFFFFF" stroke="#CAD6EA" stroke-width="1.2" opacity="1"/><circle cx="524" cy="312" r="20" fill="#3CC8B4" opacity="0.95"/><text x="524" y="316.6666666666667" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="14" font-weight="700" fill="#fff" text-anchor="middle"><tspan x="524" dy="0">3</tspan></text><text x="556" y="308" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="20" font-weight="800" fill="#172033" text-anchor="start"><tspan x="556" dy="0">检索中</tspan></text><text x="516" y="346" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="14" font-weight="400" fill="#65708A" text-anchor="start"><tspan x="516" dy="0">召回资料与片段</tspan></text><line x1="663" y1="325" x2="682" y2="325" stroke="#879AB8" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="690" y="270" width="165" height="110" rx="22" fill="#FFFFFF" stroke="#CAD6EA" stroke-width="1.2" opacity="1"/><circle cx="724" cy="312" r="20" fill="#7B61FF" opacity="0.95"/><text x="724" y="316.6666666666667" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="14" font-weight="700" fill="#fff" text-anchor="middle"><tspan x="724" dy="0">4</tspan></text><text x="756" y="308" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="20" font-weight="800" fill="#172033" text-anchor="start"><tspan x="756" dy="0">生成中</tspan></text><text x="716" y="346" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="14" font-weight="400" fill="#65708A" text-anchor="start"><tspan x="716" dy="0">整理结论与引用</tspan></text><line x1="863" y1="325" x2="882" y2="325" stroke="#879AB8" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="890" y="270" width="165" height="110" rx="22" fill="#FFFFFF" stroke="#CAD6EA" stroke-width="1.2" opacity="1"/><circle cx="924" cy="312" r="20" fill="#F5A623" opacity="0.95"/><text x="924" y="316.6666666666667" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="14" font-weight="700" fill="#fff" text-anchor="middle"><tspan x="924" dy="0">5</tspan></text><text x="956" y="308" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="20" font-weight="800" fill="#172033" text-anchor="start"><tspan x="956" dy="0">待确认</tspan></text><text x="916" y="346" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="14" font-weight="400" fill="#65708A" text-anchor="start"><tspan x="916" dy="0">人工审核与采纳</tspan></text><line x1="1063" y1="325" x2="1082" y2="325" stroke="#879AB8" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="1090" y="270" width="165" height="110" rx="22" fill="#FFFFFF" stroke="#CAD6EA" stroke-width="1.2" opacity="1"/><circle cx="1124" cy="312" r="20" fill="#2FBF71" opacity="0.95"/><text x="1124" y="316.6666666666667" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="14" font-weight="700" fill="#fff" text-anchor="middle"><tspan x="1124" dy="0">6</tspan></text><text x="1156" y="308" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="20" font-weight="800" fill="#172033" text-anchor="start"><tspan x="1156" dy="0">已完成</tspan></text><text x="1116" y="346" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="14" font-weight="400" fill="#65708A" text-anchor="start"><tspan x="1116" dy="0">输出并沉淀</tspan></text><rect x="270" y="500" width="760" height="90" rx="22" fill="#FFF8EA" stroke="#F1D39A" stroke-width="1.4" opacity="1"/><text x="300" y="538" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="21" font-weight="800" fill="#F5A623" text-anchor="start"><tspan x="300" dy="0">异常 / 来源不足 / 需补充信息</tspan></text><text x="300" y="570" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="16" font-weight="400" fill="#6B4A11" text-anchor="start"><tspan x="300" dy="0">若检索不到足够来源，系统不强行生成结论，而是提示补充资料、缩小范围或转入人工判断。</tspan></text><line x1="430" y1="380" x2="430" y2="500" stroke="#F5A623" stroke-width="2" stroke-linecap="round" stroke-dasharray="6,6"/><line x1="710" y1="380" x2="710" y2="500" stroke="#F5A623" stroke-width="2" stroke-linecap="round" stroke-dasharray="6,6"/><rect x="90" y="640" width="1120" height="50" rx="20" fill="#F5F8FF" stroke="#D6E2FF" stroke-width="1" opacity="1"/><text x="120" y="672" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="18" font-weight="700" fill="#31507A" text-anchor="start"><tspan x="120" dy="0">设计原则：关键状态可见、异常路径可解释、人工确认可介入、输出结果可回溯。</tspan></text></svg>