    </defs><rect width="1440" height="820" fill="url(#bg)"/><text x="42" y="60" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="34" font-weight="800" fill="#172033" text-anchor="start"><tspan x="42" dy="0">业务问题 → AI 介入点 → 产品责任单元</tspan></text><text x="42" y="96" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="19" font-weight="400" fill="#65708A" text-anchor="start"><tspan x="42" dy="0">从知识分散与经验难复用出发，识别 AI 应该介入的工作节点，并收敛为可维护的产品责任单元。</tspan></text><rect x="70" y="160" width="340" height="560" rx="28" fill="#FFF6EC" stroke="#DDE7F5" stroke-width="1.5" opacity="1"/><rect x="98" y="188" width="160" height="36" rx="18" fill="#FFFFFF" stroke="none" stroke-width="0" opacity="1"/><text x="178.0" y="212" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="20" font-weight="600" fill="#F5A623" text-anchor="middle"><tspan x="178.0" dy="0">业务问题</tspan></text><rect x="550" y="160" width="340" height="560" rx="28" fill="#EEF7FF" stroke="#DDE7F5" stroke-width="1.5" opacity="1"/><rect x="578" y="188" width="160" height="36" rx="18" fill="#FFFFFF" stroke="none" stroke-width="0" opacity="1"/><text x="658.0" y="212" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="20" font-weight="600" fill="#2F66F5" text-anchor="middle"><tspan x="658.0" dy="0">AI 介入点</tspan></text><rect x="1030" y="160" width="340" height="560" rx="28" fill="#F1FFF8" stroke="#DDE7F5" stroke-width="1.5" opacity="1"/><rect x="1058" y="188" width="160" height="36" rx="18" fill="#FFFFFF" stroke="none" stroke-width="0" opacity="1"/><text x="1138.0" y="212" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="20" font-weight="600" fill="#2FBF71" text-anchor="middle"><tspan x="1138.0" dy="0">产品责任单元</tspan></text><rect x="105" y="240" width="270" height="78" rx="18" fill="#FFFFFF" stroke="#F2D8B2" stroke-width="1" opacity="1"/><circle cx="132" cy="279" r="18" fill="#F5A623" opacity="0.95"/><text x="132" y="284.0" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="15" font-weight="700" fill="#fff" text-anchor="middle"><tspan x="132" dy="0">1</tspan></text><text x="160" y="272" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="19" font-weight="800" fill="#172033" text-anchor="start"><tspan x="160" dy="0">资料分散</tspan></text><text x="160" y="298" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="14" font-weight="400" fill="#65708A" text-anchor="start"><tspan x="160" dy="0">项目资料、会议记录、规则说明散落在不同位置</tspan></text><rect x="105" y="350" width="270" height="78" rx="18" fill="#FFFFFF" stroke="#F2D8B2" stroke-width="1" opacity="1"/><circle cx="132" cy="389" r="18" fill="#F5A623" opacity="0.95"/><text x="132" y="394.0" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="15" font-weight="700" fill="#fff" text-anchor="middle"><tspan x="132" dy="0">2</tspan></text><text x="160" y="382" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="19" font-weight="800" fill="#172033" text-anchor="start"><tspan x="160" dy="0">经验难复用</tspan></text><text x="160" y="408" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="14" font-weight="400" fill="#65708A" text-anchor="start"><tspan x="160" dy="0">历史项目经验依赖个人记忆，新人接手成本高</tspan></text><rect x="105" y="460" width="270" height="78" rx="18" fill="#FFFFFF" stroke="#F2D8B2" stroke-width="1" opacity="1"/><circle cx="132" cy="499" r="18" fill="#F5A623" opacity="0.95"/><text x="132" y="504.0" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="15" font-weight="700" fill="#fff" text-anchor="middle"><tspan x="132" dy="0">3</tspan></text><text x="160" y="492" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="19" font-weight="800" fill="#172033" text-anchor="start"><tspan x="160" dy="0">决策依据难追溯</tspan></text><text x="160" y="518" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="14" font-weight="400" fill="#65708A" text-anchor="start"><tspan x="160" dy="0">结论被复用时，来源与历史判断难确认</tspan></text><rect x="105" y="570" width="270" height="78" rx="18" fill="#FFFFFF" stroke="#F2D8B2" stroke-width="1" opacity="1"/><circle cx="132" cy="609" r="18" fill="#F5A623" opacity="0.95"/><text x="132" y="614.0" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="15" font-weight="700" fill="#fff" text-anchor="middle"><tspan x="132" dy="0">4</tspan></text><text x="160" y="602" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="19" font-weight="800" fill="#172033" text-anchor="start"><tspan x="160" dy="0">复盘难沉淀</tspan></text><text x="160" y="628" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="14" font-weight="400" fill="#65708A" text-anchor="start"><tspan x="160" dy="0">项目结束后材料留在文档里，缺少持续维护</tspan></text><rect x="592" y="225" width="250" height="54" rx="16" fill="#FFFFFF" stroke="#BBD5FF" stroke-width="1" opacity="1"/><text x="618" y="249" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="17" font-weight="800" fill="#2F66F5" text-anchor="start"><tspan x="618" dy="0">找资料</tspan></text><text x="618" y="271" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="13" font-weight="400" fill="#65708A" text-anchor="start"><tspan x="618" dy="0">语义检索 + 片段召回</tspan></text><rect x="592" y="301" width="250" height="54" rx="16" fill="#FFFFFF" stroke="#BBD5FF" stroke-width="1" opacity="1"/><text x="618" y="325" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="17" font-weight="800" fill="#2F66F5" text-anchor="start"><tspan x="618" dy="0">找依据</tspan></text><text x="618" y="347" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="13" font-weight="400" fill="#65708A" text-anchor="start"><tspan x="618" dy="0">引用溯源 + 证据片段</tspan></text><rect x="592" y="377" width="250" height="54" rx="16" fill="#FFFFFF" stroke="#BBD5FF" stroke-width="1" opacity="1"/><text x="618" y="401" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="17" font-weight="800" fill="#2F66F5" text-anchor="start"><tspan x="618" dy="0">整理结论</tspan></text><text x="618" y="423" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="13" font-weight="400" fill="#65708A" text-anchor="start"><tspan x="618" dy="0">多文档归纳 + 结构化总结</tspan></text><rect x="592" y="453" width="250" height="54" rx="16" fill="#FFFFFF" stroke="#BBD5FF" stroke-width="1" opacity="1"/><text x="618" y="477" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="17" font-weight="800" fill="#2F66F5" text-anchor="start"><tspan x="618" dy="0">项目复盘</tspan></text><text x="618" y="499" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="13" font-weight="400" fill="#65708A" text-anchor="start"><tspan x="618" dy="0">复盘模板 + 关键经验提炼</tspan></text><rect x="592" y="529" width="250" height="54" rx="16" fill="#FFFFFF" stroke="#BBD5FF" stroke-width="1" opacity="1"/><text x="618" y="553" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="17" font-weight="800" fill="#2F66F5" text-anchor="start"><tspan x="618" dy="0">经验沉淀</tspan></text><text x="618" y="575" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="13" font-weight="400" fill="#65708A" text-anchor="start"><tspan x="618" dy="0">转为可复用知识资产</tspan></text><rect x="592" y="605" width="250" height="54" rx="16" fill="#FFFFFF" stroke="#BBD5FF" stroke-width="1" opacity="1"/><text x="618" y="629" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="17" font-weight="800" fill="#2F66F5" text-anchor="start"><tspan x="618" dy="0">迭代优化</tspan></text><text x="618" y="651" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="13" font-weight="400" fill="#65708A" text-anchor="start"><tspan x="618" dy="0">failure case + eval + 版本记录</tspan></text><rect x="1072" y="225" width="250" height="54" rx="16" fill="#FFFFFF" stroke="#BDEDD9" stroke-width="1" opacity="1"/><text x="1098" y="249" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="17" font-weight="800" fill="#2FBF71" text-anchor="start"><tspan x="1098" dy="0">可信上下文层</tspan></text><text x="1098" y="271" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="13" font-weight="400" fill="#65708A" text-anchor="start"><tspan x="1098" dy="0">控制知识边界与引用依据</tspan></text><rect x="1072" y="301" width="250" height="54" rx="16" fill="#FFFFFF" stroke="#BDEDD9" stroke-width="1" opacity="1"/><text x="1098" y="325" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="17" font-weight="800" fill="#2FBF71" text-anchor="start"><tspan x="1098" dy="0">知识任务型问答</tspan></text><text x="1098" y="347" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="13" font-weight="400" fill="#65708A" text-anchor="start"><tspan x="1098" dy="0">围绕知识整理任务组织输出</tspan></text><rect x="1072" y="377" width="250" height="54" rx="16" fill="#FFFFFF" stroke="#BDEDD9" stroke-width="1" opacity="1"/><text x="1098" y="401" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="17" font-weight="800" fill="#2F66F5" text-anchor="start"><tspan x="1098" dy="0">Agent 工作流</tspan></text><text x="1098" y="423" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="13" font-weight="400" fill="#65708A" text-anchor="start"><tspan x="1098" dy="0">Router / Tool / Memory 协同</tspan></text><rect x="1072" y="453" width="250" height="54" rx="16" fill="#FFFFFF" stroke="#BDEDD9" stroke-width="1" opacity="1"/><text x="1098" y="477" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="17" font-weight="800" fill="#2FBF71" text-anchor="start"><tspan x="1098" dy="0">Human Review</tspan></text><text x="1098" y="499" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="13" font-weight="400" fill="#65708A" text-anchor="start"><tspan x="1098" dy="0">关键输出保留人工确认</tspan></text><rect x="1072" y="529" width="250" height="54" rx="16" fill="#FFFFFF" stroke="#BDEDD9" stroke-width="1" opacity="1"/><text x="1098" y="553" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="17" font-weight="800" fill="#2FBF71" text-anchor="start"><tspan x="1098" dy="0">failure case / eval</tspan></text><text x="1098" y="575" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="13" font-weight="400" fill="#65708A" text-anchor="start"><tspan x="1098" dy="0">将错误转为回归测试素材</tspan></text><rect x="1072" y="605" width="250" height="54" rx="16" fill="#FFFFFF" stroke="#BDEDD9" stroke-width="1" opacity="1"/><text x="1098" y="629" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="17" font-weight="800" fill="#2FBF71" text-anchor="start"><tspan x="1098" dy="0">版本管理</tspan></text><text x="1098" y="651" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="13" font-weight="400" fill="#65708A" text-anchor="start"><tspan x="1098" dy="0">变更可追踪，可回滚</tspan></text><line x1="420" y1="440" x2="520" y2="440" stroke="#8BA1C0" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/><line x1="900" y1="440" x2="1000" y2="440" stroke="#8BA1C0" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="70" y="750" width="1300" height="42" rx="18" fill="#F5F8FF" stroke="#D6E2FF" stroke-width="1" opacity="1"/><text x="96" y="778" font-family="Noto Sans CJK SC, Noto Sans CJK, Arial, sans-serif" font-size="18" font-weight="500" fill="#31507A" text-anchor="start"><tspan x="96" dy="0">图注：AI 并不是只做文档问答，而是嵌入到“找资料 - 找依据 - 复盘 - 沉淀 - 评估”的知识工作流中。</tspan></text></svg>