<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
  <defs>
    <style>
      .title { font: 700 34px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#111827; }
      .subtitle { font: 500 18px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#4b5563; }
      .boxTitle { font: 700 27px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#111827; }
      .boxSub { font: 500 17px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#4b5563; }
      .centerTitle { font: 800 30px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#111827; }
      .centerSub { font: 600 18px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#374151; }
      .chip { font: 650 15px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#1f2937; }
      .tiny { font: 500 14px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#6b7280; }
      .note { font: 650 16px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#374151; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1400" height="760" fill="#f8fafc"/>

  <text x="70" y="70" class="title">AI 应用产品化中间层 / Readiness Operating Layer</text>
  <text x="70" y="104" class="subtitle">Demo 和真实试点之间，需要一组轻量机制，把模型能力转化为可被组织使用的产品能力。</text>

  <!-- Left: Demo -->
  <rect x="80" y="210" rx="28" ry="28" width="270" height="250" fill="#ffffff" stroke="#e5e7eb" filter="url(#shadow)"/>
  <text x="215" y="275" text-anchor="middle" class="boxTitle">AI Demo</text>
  <text x="215" y="310" text-anchor="middle" class="boxSub">证明“能生成”</text>
  <rect x="122" y="350" rx="18" ry="18" width="186" height="44" fill="#eef2ff"/>
  <text x="215" y="378" text-anchor="middle" class="chip">局部链路可跑通</text>

  <!-- Center: Layer -->
  <rect x="470" y="150" rx="34" ry="34" width="460" height="460" fill="#ffffff" stroke="#c7d2fe" stroke-width="2.2" filter="url(#shadow)"/>
  <text x="700" y="210" text-anchor="middle" class="centerTitle">产品化中间层</text>
  <text x="700" y="245" text-anchor="middle" class="centerSub">From “AI can generate”</text>
  <text x="700" y="273" text-anchor="middle" class="centerSub">to “AI can be used”</text>

  <!-- chips in center -->
  <rect x="515" y="320" rx="18" ry="18" width="170" height="44" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="600" y="348" text-anchor="middle" class="chip">机会池</text>
  <rect x="715" y="320" rx="18" ry="18" width="170" height="44" fill="#ecfeff" stroke="#a5f3fc"/>
  <text x="800" y="348" text-anchor="middle" class="chip">场景准入</text>

  <rect x="515" y="382" rx="18" ry="18" width="170" height="44" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="600" y="410" text-anchor="middle" class="chip">风险边界</text>
  <rect x="715" y="382" rx="18" ry="18" width="170" height="44" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="800" y="410" text-anchor="middle" class="chip">人审节点</text>

  <rect x="515" y="444" rx="18" ry="18" width="170" height="44" fill="#fefce8" stroke="#fde68a"/>
  <text x="600" y="472" text-anchor="middle" class="chip">指标评估</text>
  <rect x="715" y="444" rx="18" ry="18" width="170" height="44" fill="#fdf2f8" stroke="#fbcfe8"/>
  <text x="800" y="472" text-anchor="middle" class="chip">Launch Gate</text>

  <rect x="600" y="506" rx="18" ry="18" width="200" height="44" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="700" y="534" text-anchor="middle" class="chip">badcase 迭代</text>

  <text x="700" y="580" text-anchor="middle" class="tiny">不是重型平台，而是 Demo → Pilot 之间的最小可行承接机制</text>

  <!-- Right: Pilot-ready -->
  <rect x="1050" y="210" rx="28" ry="28" width="270" height="250" fill="#ffffff" stroke="#e5e7eb" filter="url(#shadow)"/>
  <text x="1185" y="268" text-anchor="middle" class="boxTitle">Pilot-ready</text>
  <text x="1185" y="302" text-anchor="middle" class="boxTitle">AI Application</text>
  <text x="1185" y="338" text-anchor="middle" class="boxSub">证明“能被使用”</text>
  <rect x="1092" y="378" rx="18" ry="18" width="186" height="44" fill="#dcfce7"/>
  <text x="1185" y="406" text-anchor="middle" class="chip">可验证、可迭代</text>

  <!-- arrows -->
  <line x1="350" y1="335" x2="470" y2="335" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="930" y1="335" x2="1050" y2="335" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>

  <!-- Bottom note -->
  <rect x="90" y="660" rx="18" ry="18" width="1220" height="58" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="700" y="696" text-anchor="middle" class="note">模块 2 展示中间层在流程型 AI 应用中的具体实现；模块 4 把它抽象为 AI 应用从 Demo 到 Pilot 的通用承接机制。</text>
</svg>