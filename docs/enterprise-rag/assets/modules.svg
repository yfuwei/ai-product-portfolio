  <text x="100" y="112" fill="#111418" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="800">产品模块框架</text>
  <g font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">
