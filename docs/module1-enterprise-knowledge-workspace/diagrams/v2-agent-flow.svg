<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="540" viewBox="0 0 1400 540" role="img" aria-labelledby="title desc">
  <title id="title">V2 Agentic RAG 决策流程图</title>
  <desc id="desc">展示用户请求进入 Router 后，按 direct 或 retrieve 两条路径执行，并由 Memory 参与上下文与结果回写的 V2 Agentic RAG 链路。</desc>
  <defs>
    <style>
      .bg { fill: #f5f7fb; }
      .box { fill: #ffffff; stroke: #d9e1e7; stroke-width: 2; rx: 14; ry: 14; }
      .accent { fill: #eef9fd; stroke: #00a6d6; }
      .dark { fill: #111418; stroke: #111418; }
      .output { fill: #ffe8ee; stroke: #f04467; }
      .text { fill: #111418; font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 22px; font-weight: 700; }
      .sub { fill: #66717a; font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 18px; }
      .lighttext { fill: #ffffff; font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 22px; font-weight: 700; }
      .lightsub { fill: rgba(255,255,255,0.78); font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 18px; }
      .label { fill: #f7d84a; font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 16px; font-weight: 700; }
      .arrow { stroke: #111418; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .memory { fill: #fff7d6; stroke: #f7d84a; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#111418" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="540" rx="24" />

  <rect class="box" x="70" y="220" width="180" height="88" />
  <text class="text" x="160" y="258" text-anchor="middle">User Query</text>
  <text class="sub" x="160" y="286" text-anchor="middle">问题 / 任务目标</text>

  <rect class="box accent" x="320" y="220" width="190" height="88" />
  <text class="text" x="415" y="258" text-anchor="middle">Router</text>
  <text class="sub" x="415" y="286" text-anchor="middle">先判断路径</text>

  <rect class="box dark" x="600" y="90" width="220" height="92" />
  <text class="lighttext" x="710" y="130" text-anchor="middle">Direct Answer</text>
  <text class="lightsub" x="710" y="160" text-anchor="middle">无需检索直接回答</text>

  <rect class="box accent" x="600" y="340" width="220" height="92" />
  <text class="text" x="710" y="380" text-anchor="middle">search_docs Tool</text>
  <text class="sub" x="710" y="410" text-anchor="middle">调用知识库检索</text>

  <rect class="box" x="930" y="220" width="220" height="88" />
  <text class="text" x="1040" y="258" text-anchor="middle">Answer LLM</text>
  <text class="sub" x="1040" y="286" text-anchor="middle">结合上下文生成</text>

  <rect class="box output" x="1220" y="220" width="130" height="88" />
  <text class="text" x="1285" y="258" text-anchor="middle">Answer</text>
  <text class="sub" x="1285" y="286" text-anchor="middle">最终输出</text>

  <rect class="box memory" x="930" y="400" width="220" height="88" />
  <text class="text" x="1040" y="438" text-anchor="middle">Memory</text>
  <text class="sub" x="1040" y="466" text-anchor="middle">保留最近上下文</text>

  <line class="arrow" x1="250" y1="264" x2="320" y2="264" />
  <path class="arrow" d="M510 244 C560 210, 560 136, 600 136" />
  <path class="arrow" d="M510 284 C560 320, 560 386, 600 386" />
  <line class="arrow" x1="820" y1="136" x2="930" y2="244" />
  <path class="arrow" d="M820 386 C875 386, 885 300, 930 264" />
  <line class="arrow" x1="1150" y1="264" x2="1220" y2="264" />
  <path class="arrow" d="M1285 308 C1285 380, 1120 380, 1120 400" />
  <path class="arrow" d="M930 444 C700 520, 400 500, 400 308" />

  <text class="label" x="560" y="210">direct</text>
  <text class="label" x="555" y="335">retrieve</text>
</svg>
