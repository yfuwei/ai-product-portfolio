<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">工作台总览示意图</title>
  <desc id="desc">AIGC视觉生成工作台界面示意，包括场景、字段、Prompt和候选结果。</desc>
  <rect width="1280" height="720" fill="#f6f8f2"/>
  <rect x="72" y="64" width="1136" height="592" rx="8" fill="#fff" stroke="#cfd8d3"/>
  <rect x="72" y="64" width="1136" height="64" rx="8" fill="#101820"/>
  <text x="104" y="105" font-family="Arial, 'PingFang SC', sans-serif" font-size="24" font-weight="700" fill="#fff">AIGC 视觉生成工作台</text>
  <rect x="104" y="160" width="218" height="444" rx="8" fill="#eef4f1" stroke="#d7dfd9"/>
  <text x="128" y="196" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" font-weight="700" fill="#101820">场景模板</text>
  <g font-family="Arial, 'PingFang SC', sans-serif" font-size="16" fill="#23313a">
    <rect x="128" y="224" width="154" height="38" rx="8" fill="#ffffff" stroke="#cfd8d3"/><text x="146" y="249">住宅大堂</text>
    <rect x="128" y="276" width="154" height="38" rx="8" fill="#ffffff" stroke="#cfd8d3"/><text x="146" y="301">建筑立面</text>
    <rect x="128" y="328" width="154" height="38" rx="8" fill="#ffffff" stroke="#cfd8d3"/><text x="146" y="353">景观节点</text>
    <rect x="128" y="380" width="154" height="38" rx="8" fill="#ffffff" stroke="#cfd8d3"/><text x="146" y="405">汇报配图</text>
  </g>
  <rect x="354" y="160" width="372" height="444" rx="8" fill="#fff9e6" stroke="#eadb9b"/>
  <text x="382" y="196" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" font-weight="700" fill="#101820">结构化输入 + Prompt</text>
  <rect x="382" y="224" width="300" height="180" rx="8" fill="#fff" stroke="#eadb9b"/>
  <g font-family="Arial, 'PingFang SC', sans-serif" font-size="15" fill="#23313a">
    <text x="404" y="258">项目定位：高端改善住宅</text>
    <text x="404" y="288">场景功能：归家大堂</text>
    <text x="404" y="318">风格方向：现代东方</text>
    <text x="404" y="348">视角：室内广角人视</text>
    <text x="404" y="378">表达重点：温暖高级、归家感</text>
  </g>
  <rect x="382" y="432" width="300" height="116" rx="8" fill="#fff" stroke="#eadb9b"/>
  <text x="404" y="466" font-family="Arial, 'PingFang SC', sans-serif" font-size="15" fill="#23313a">high-end residential lobby, modern oriental, stone wall, warm wood veneer...</text>
  <text x="404" y="510" font-family="Arial, 'PingFang SC', sans-serif" font-size="15" fill="#9f2d2d">Negative: text, watermark, distorted perspective</text>
  <rect x="758" y="160" width="418" height="444" rx="8" fill="#eef7fb" stroke="#bddbe6"/>
  <text x="786" y="196" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" font-weight="700" fill="#101820">候选图与标注</text>
