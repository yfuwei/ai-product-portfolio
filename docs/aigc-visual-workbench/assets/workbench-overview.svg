    <rect x="786" y="390" width="152" height="112" rx="8" fill="#e1ead8"/><path d="M806 478 L836 440 L864 466 L900 430 L920 478 Z" fill="#7d9c67"/><circle cx="834" cy="424" r="10" fill="#f4c542"/>
